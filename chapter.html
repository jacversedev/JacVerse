    <style>
        /* Premium Chapter List UI Design - Matching your App Layout */
        .chapter-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto 30px auto;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }


        .chapter-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.8));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: all 0.25s ease;
        }


        .chapter-card h3 {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.4;
        }


        .chapter-card h3 span {
            background: #2563eb;
            color: #fff;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 700;
        }


        .resource-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }


        .res-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            padding: 8px 4px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }


        .res-btn i {
            font-size: 14px;
        }


        .res-btn:active, .res-btn:hover {
            background: #2563eb;
            color: #fff;
            border-color: #38bdf8;
        }
    </style>
</head>
